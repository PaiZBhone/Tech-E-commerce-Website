<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .banner{
            width: 50%;
            height: 400px;
            margin: auto;
            background-image:
             url('./photo/dynamic_island_deep_purple__exowosw6732a_large.jpg');
            background-size: cover;
            animation: fade 10s ease-in-out infinite;

        }
        @keyframes fade{
            0%,25%{
                background-image: url('./photo/dynamic_island_deep_purple__exowosw6732a_large.jpg');
            }
            35%,60%{
                background-image: url('./photo/MacBook_Pro_M2_Banner-new-2048x731.webp');
            }
            70%,90%{
                background-image: url('./photo/zenbook.png');
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        
    </div>
    
</body>
</html>
