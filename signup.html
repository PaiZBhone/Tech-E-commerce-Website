<!DOCTYPE html>

<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>Sign Up</title>
      <link rel="stylesheet" href="signup.css">
      <script src="microit.js"></script>
   </head>
   <body>
    <form action="cart.html" name="loginform1"  method="post" onsubmit="return loginValidate()">
        <div class="container">
          <center><img src="./photo/logo2.png" width="100px" height="100px"></center>
          <h1>Sign Up</h1>
        
          <p>Please fill in this form to create an account.</p>
          <hr>
          
          <label for="email"><b>Email</b></label>
          <input type="text" placeholder="Enter Email" name="email">
          

          <label for="Username"><b>Username</b></label>
          <input type="text" placeholder="Enter Username" name="myname">
      
          <label for="psw"><b>Password</b></label>
          <input type="password" placeholder="Enter Password" name="mypsw">
      
          <label for="psw-repeat"><b>Confirm Password</b></label>
          <input type="password" placeholder="Confirm Password" name="mypswconfirm">
          
          <label>
            <input type="checkbox" checked="checked" name="remember" style="margin-bottom:15px"> Remember me
          </label>
          
          <p>By creating an account you agree to our <a href="about3.html" style="color:dodgerblue">Terms & Privacy</a>.</p>
      
          <div class="clearfix">
            <a href="Microit.html"><button type="button" class="cancelbtn">Cancel </button></a>
            <button type="submit" class="signupbtn">Sign Up</button>
          </div>
        </div>
      </form>
    
   </body>
</html>
